# SD CREATIV — stack Docker
#
# Développement local (app + PostgreSQL + Redis, port 3001) :
#   cp .env.docker.example .env.docker   # secrets app
#   docker compose up -d --build          # charge aussi docker-compose.override.yml
#
# Production VPS (Nginx + Certbot SSL) :
#   ./scripts/docker-preflight.sh
#   ./scripts/docker-prod-deploy.sh
#   # ou manuellement :
#   ./docker/certbot/init-letsencrypt.sh
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile prod up -d --build
#
# Guide complet : docs/DOCKER-PRODUCTION.md

name: sdcreativ

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3001}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
    restart: unless-stopped
    env_file: .env.docker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sdcreativ}:${POSTGRES_PASSWORD:-sdcreativ}@postgres:5432/${POSTGRES_DB:-sdcreativ}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - sdcreativ
    expose:
      - "3000"
    # Port hôte en dev : docker-compose.override.yml (auto-chargé)
    # Prod : pas de port exposé — trafic via Nginx :80/:443

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sdcreativ}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sdcreativ}
      POSTGRES_DB: ${POSTGRES_DB:-sdcreativ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sdcreativ} -d ${POSTGRES_DB:-sdcreativ}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Port hôte en dev uniquement : docker-compose.override.yml (5433 → outils locaux)
    # Prod : pas de port exposé — accès via docker compose exec postgres
    networks:
      - sdcreativ

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - sdcreativ

  nginx:
    profiles: ["prod"]
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      # Ne pas suivre la redirection 301 vers https://DOMAIN (échoue hors réseau Docker)
      test: ["CMD-SHELL", "wget -q --spider -S http://127.0.0.1/ 2>&1 | grep -qE 'HTTP/.* (200|301)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - uploads_data:/var/www/uploads:ro
    networks:
      - sdcreativ

  certbot:
    profiles: ["prod"]
    image: certbot/certbot:latest
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_healthy
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --quiet --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"
    networks:
      - sdcreativ

networks:
  sdcreativ:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_certs:
  uploads_data:
