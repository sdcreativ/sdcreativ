name: Deploy

# Production : VPS Hostinger + Docker (pas Vercel).
#
# Déploiement automatique : push sur main → CI réussie → rebuild Docker sur le VPS.
# Déploiement manuel : Actions → Deploy → Run workflow (saisir « deploy »).
#
# Prérequis VPS : runner self-hosted (scripts/install-github-runner.sh)

on:
  # Auto : après CI verte sur main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Manuel : secours ou hotfix
  workflow_dispatch:
    inputs:
      confirm:
        description: "Tapez deploy pour lancer le déploiement VPS"
        required: true
        default: "deploy"

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy-vps:
    name: Deploy VPS (Docker)
    runs-on: [self-hosted, linux, sdcreativ-vps]
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'deploy') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment:
      name: production
      url: https://sdcreativ.com

    steps:
      - name: Déployer (git pull + Docker)
        run: |
          if [ "$(id -un)" = "deploy" ]; then
            bash /var/www/sdcreativ/scripts/vps-deploy-pull.sh
          else
            sudo -n -u deploy bash /var/www/sdcreativ/scripts/vps-deploy-pull.sh
          fi

      - name: Résumé
        if: always()
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            COMMIT="${{ github.event.workflow_run.head_sha }}"
            TRIGGER="auto (CI main)"
          else
            COMMIT="${{ github.sha }}"
            TRIGGER="manuel"
          fi
          {
            echo "## Déploiement production — sdcreativ.com"
            echo ""
            echo "Déclencheur : ${TRIGGER}"
            echo "Runner : self-hosted (\`sdcreativ-vps\`)"
            echo "Commit : \`${COMMIT}\`"
            echo "Statut : ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
