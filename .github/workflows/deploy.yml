name: Deploy

# Production : VPS Hostinger + Docker (pas Vercel).
# Voir docs/DEPLOIEMENT-SDCREATIV-COM.md et docs/GITHUB-ACTIONS-RUNNER.md
#
# Déploiement via runner self-hosted sur le VPS (pas de SSH entrant depuis GitHub cloud).
# Installation one-shot : scripts/install-github-runner.sh

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Tapez deploy pour lancer le déploiement VPS"
        required: true
        default: "deploy"

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy-vps:
    name: Deploy VPS (Docker)
    # Runner installé sur le VPS — labels définis dans install-github-runner.sh
    runs-on: [self-hosted, linux, sdcreativ-vps]
    if: github.event.inputs.confirm == 'deploy'
    environment:
      name: production
      url: https://sdcreativ.com

    steps:
      - name: Déployer (git pull + Docker)
        run: bash /var/www/sdcreativ/scripts/vps-deploy-pull.sh

      - name: Résumé
        if: always()
        run: |
          {
            echo "## Déploiement production — sdcreativ.com"
            echo ""
            echo "Runner : self-hosted (\`sdcreativ-vps\`)"
            echo "Commit : \`${{ github.sha }}\`"
            echo "Statut : ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
