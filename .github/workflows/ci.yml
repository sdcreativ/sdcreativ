name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://sdcreativ.com

  smoke-pdf:
    name: Smoke PDF (Chromium)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium (system)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
          if [ -x /usr/bin/chromium-browser ]; then
            echo "CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium-browser" >> "$GITHUB_ENV"
          elif [ -x /usr/bin/chromium ]; then
            echo "CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium" >> "$GITHUB_ENV"
          else
            echo "Chromium introuvable après apt-get" >&2
            exit 1
          fi

      - name: Smoke PDF
        run: npm run smoke:pdf

  e2e:
    name: E2E smoke
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://sdcreativ.com

      - name: Run smoke tests
        run: npm run test:e2e
        env:
          CI: true
          NEXT_PUBLIC_SITE_URL: https://sdcreativ.com

      - name: Run a11y tests
        run: npm run test:a11y
        env:
          CI: true
          NEXT_PUBLIC_SITE_URL: https://sdcreativ.com

  # secrets n'est pas autorisé dans jobs.*.if — gate via env + output
  e2e-crm-gate:
    name: E2E CRM gate
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.CRM_E2E_LOGIN_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  e2e-crm:
    name: E2E CRM (optionnel)
    runs-on: ubuntu-latest
    needs: e2e-crm-gate
    if: ${{ needs.e2e-crm-gate.outputs.enabled == 'true' }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sdcreativ
          POSTGRES_PASSWORD: sdcreativ
          POSTGRES_DB: sdcreativ
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sdcreativ -d sdcreativ"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Init database
        run: npm run db:init
        env:
          DATABASE_URL: postgresql://sdcreativ:sdcreativ@localhost:5432/sdcreativ

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://sdcreativ.com
          ADMIN_SECRET: ${{ secrets.CRM_E2E_ADMIN_SECRET }}
          DATABASE_URL: postgresql://sdcreativ:sdcreativ@localhost:5432/sdcreativ

      - name: Run CRM e2e
        run: npm run test:e2e:crm
        env:
          CI: true
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          ADMIN_SECRET: ${{ secrets.CRM_E2E_ADMIN_SECRET }}
          DATABASE_URL: postgresql://sdcreativ:sdcreativ@localhost:5432/sdcreativ
          # Bootstrap admin = ADMIN_SECRET ; email défaut admin@sdcreativ.com
          CRM_E2E_EMAIL: ${{ secrets.CRM_E2E_EMAIL }}
          CRM_E2E_PASSWORD: ${{ secrets.CRM_E2E_ADMIN_SECRET }}
          CRM_E2E_LOGIN_TOKEN: ${{ secrets.CRM_E2E_LOGIN_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
