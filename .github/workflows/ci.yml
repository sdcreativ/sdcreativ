name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://sdcreativ.com

  e2e:
    name: E2E smoke
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://sdcreativ.com

      - name: Run smoke tests
        run: npm run test:e2e
        env:
          CI: true
          NEXT_PUBLIC_SITE_URL: https://sdcreativ.com

      - name: Run a11y tests
        run: npm run test:a11y
        env:
          CI: true
          NEXT_PUBLIC_SITE_URL: https://sdcreativ.com
