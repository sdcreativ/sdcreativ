# Dev local — chargé automatiquement par `docker compose up` (avec docker-compose.yml).
# 3001 évite le conflit avec `npm run dev` sur 3000.

services:
  app:
    ports:
      - "${APP_PORT:-3001}:3000"

  postgres:
    ports:
      # Accès depuis l'hôte (pg_dump, DBeaver) sans conflit avec PostgreSQL local :5432
      - "${POSTGRES_PORT:-5433}:5432"
